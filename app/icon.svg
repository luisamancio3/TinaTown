<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="32" height="32" shape-rendering="crispEdges">
  <!-- Purple background -->
  <rect width="16" height="16" rx="3" fill="#2d1b4e"/>

  <!-- Hair -->
  <rect x="5" y="1" width="6" height="1" fill="#141418"/>
  <rect x="4" y="2" width="8" height="1" fill="#141418"/>
  <rect x="3" y="3" width="10" height="2" fill="#141418"/>
  <rect x="3" y="5" width="1" height="4" fill="#141418"/>
  <rect x="12" y="5" width="1" height="4" fill="#141418"/>

  <!-- Face -->
  <rect x="4" y="5" width="8" height="7" fill="#fef5f0"/>
  <rect x="5" y="12" width="6" height="1" fill="#fef5f0"/>

  <!-- Eyes -->
  <rect x="6" y="7" width="1" height="1" fill="#2d6b3f"/>
  <rect x="9" y="7" width="1" height="1" fill="#2d6b3f"/>

  <!-- Blush -->
  <rect x="5" y="9" width="1" height="1" fill="#ffb0b0"/>
